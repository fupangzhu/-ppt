  <text x="480" y="523" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="620" y="523" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx~xx mm</text>
  <text x="760" y="523" font-family="Arial, sans-serif" font-size="11" fill="#000000">0 mm</text>
