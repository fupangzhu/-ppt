  <rect x="264" y="274" width="856" height="32" fill="#BFBFBF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="280" y="295" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">整机宽度  ▼</text>
  <text x="480" y="295" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="620" y="295" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx~xx mm</text>
  <text x="760" y="295" font-family="Arial, sans-serif" font-size="11" fill="#000000">+x.x mm</text>
  <text x="880" y="295" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">偏高</text>

  <!-- Expanded detail sub-panel -->
  <rect x="264" y="306" width="856" height="100" fill="#F7F7F7" stroke="#BFBFBF" stroke-width="1"/>
  <text x="284" y="326" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">研究依据</text>
  <text x="284" y="344" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">根据xx名被试握持实验数据，最优握持宽度区间为xx~xx mm，超出此范围舒适度评分显著下降。</text>
  <text x="284" y="370" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">优化建议</text>
  <text x="284" y="388" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">建议将宽度调整至xx~xx mm区间，可提升握持舒适度评分约xx%。</text>

  <!-- Remaining rows -->
