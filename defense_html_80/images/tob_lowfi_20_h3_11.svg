  <text x="620" y="427" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx~xxx mm</text>
  <text x="760" y="427" font-family="Arial, sans-serif" font-size="11" fill="#000000">+x mm</text>
  <text x="880" y="427" font-family="Arial, sans-serif" font-size="11" fill="#000000">适中</text>

  <rect x="264" y="438" width="856" height="32" fill="#F7F7F7" stroke="#BFBFBF" stroke-width="1"/>
