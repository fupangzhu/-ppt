  <text x="480" y="459" font-family="Arial, sans-serif" font-size="11" fill="#000000">x.x mm</text>
  <text x="620" y="459" font-family="Arial, sans-serif" font-size="11" fill="#000000">x~x mm</text>
  <text x="760" y="459" font-family="Arial, sans-serif" font-size="11" fill="#000000">-x.x mm</text>
  <text x="880" y="459" font-family="Arial, sans-serif" font-size="11" fill="#000000">适中</text>

  <rect x="264" y="470" width="856" height="32" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
