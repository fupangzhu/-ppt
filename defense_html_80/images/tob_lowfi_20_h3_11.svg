  <text x="620" y="491" font-family="Arial, sans-serif" font-size="11" fill="#000000">xxx~xxx g</text>
  <text x="760" y="491" font-family="Arial, sans-serif" font-size="11" fill="#000000">+xx g</text>
  <text x="880" y="491" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">偏高</text>

  <rect x="264" y="502" width="856" height="32" fill="#F7F7F7" stroke="#BFBFBF" stroke-width="1"/>
