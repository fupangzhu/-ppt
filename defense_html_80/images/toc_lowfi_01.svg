<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>

  <!-- Top nav bar (gray) -->
  <rect x="0" y="0" width="1280" height="64" fill="#7A7A7A"/>
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <!-- Top nav menu placeholders -->
  <text x="540" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">xxxxxx</text>
  <text x="660" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">xxxxxx</text>
  <text x="780" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">xxxxxx</text>
  <!-- Login button -->
  <rect x="1170" y="20" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1198" y="39" font-family="Arial, sans-serif" font-size="12" fill="#000000">xxxx</text>

  <!-- Left content area (white) - hero text -->
  <text x="80" y="380" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="140" fill="#000000" letter-spacing="2">GRIPFIT</text>
  <!-- Tagline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="14" fill="#888888" letter-spacing="2">XXXX XXX XXXXXXX XXXXX XXX XXXX XXXX</text>

  <!-- CTA Button -->
  <rect x="80" y="500" width="160" height="48" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="142" y="530" font-family="Arial, sans-serif" font-size="14" fill="#000000" text-anchor="middle">开始使用</text>

  <!-- Right side banner (gray with X) - product imagery placeholder -->
  <rect x="720" y="64" width="560" height="787" fill="#D0D0D0"/>
  <line x1="720" y1="64" x2="1280" y2="851" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="1280" y1="64" x2="720" y2="851" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Inner image label -->
  <rect x="900" y="430" width="200" height="60" fill="#7A7A7A"/>
  <text x="1000" y="466" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">XXXX</text>

  <!-- Decorative dots top right -->
  <circle cx="1230" cy="92" r="3" fill="#000000"/>
  <circle cx="1242" cy="92" r="3" fill="#000000"/>
  <circle cx="1254" cy="92" r="3" fill="#000000"/>

</svg>
