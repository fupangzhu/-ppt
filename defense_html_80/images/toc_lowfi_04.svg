<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="56" fill="#7A7A7A"/>
  <text x="40" y="36" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <rect x="1170" y="18" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="37" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">登录</text>
  <!-- Dark background area -->
  <rect x="0" y="56" width="1280" height="795" fill="#7A7A7A"/>
  <!-- Back to top -->
  <text x="40" y="821" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">← 返回</text>
  <!-- Start button -->
  <rect x="1130" y="793" width="120" height="40" fill="#D9D9D9"/>
  <text x="1190" y="819" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">开始使用</text>
  <!-- Central card -->
  <rect x="460" y="180" width="360" height="440" fill="#BFBFBF" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Step badge -->
  <text x="620" y="220" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">步骤 1/3</text>
  <!-- Icon placeholder -->
  <rect x="570" y="240" width="40" height="40" fill="#D0D0D0"/>
  <line x1="570" y1="240" x2="610" y2="280" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="610" y1="240" x2="570" y2="280" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Title -->
  <text x="490" y="322" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">精准手部测量</text>
  <!-- Desc -->
  <text x="490" y="360" font-family="Arial, sans-serif" font-size="12" fill="#D9D9D9">通过简单几步采集手部数据，</text>
  <text x="490" y="380" font-family="Arial, sans-serif" font-size="12" fill="#D9D9D9">系统就能计算哪款手机最适合你</text>
  <!-- Hand image placeholder -->
  <rect x="490" y="400" width="260" height="160" fill="#7A7A7A" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="490" y1="400" x2="750" y2="560" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="750" y1="400" x2="490" y2="560" stroke="#BFBFBF" stroke-width="1"/>
  <!-- Dots navigation -->
  <circle cx="614" cy="801" r="5" fill="#FFFFFF"/>
  <circle cx="634" cy="801" r="4" fill="#BFBFBF"/>
  <circle cx="652" cy="801" r="4" fill="#BFBFBF"/>
