  <text x="620" y="359" font-family="Arial, sans-serif" font-size="11" fill="#000000">x~x mm</text>
  <text x="760" y="359" font-family="Arial, sans-serif" font-size="11" fill="#000000">-x.x mm</text>
  <text x="880" y="359" font-family="Arial, sans-serif" font-size="11" fill="#000000">适中</text>

