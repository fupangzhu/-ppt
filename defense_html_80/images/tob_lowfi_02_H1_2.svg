  <rect x="0" y="206" width="220" height="36" fill="#BFBFBF"/>
  <text x="48" y="229" font-family="Arial, sans-serif" font-size="13" fill="#000000">+ 新建项目</text>

  <!-- Sidebar: 资源 -->
  <text x="20" y="278" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A" letter-spacing="1">资源</text>
  <text x="48" y="312" font-family="Arial, sans-serif" font-size="13" fill="#000000">数据库</text>
  <text x="48" y="348" font-family="Arial, sans-serif" font-size="13" fill="#000000">参与者管理</text>
  <text x="48" y="384" font-family="Arial, sans-serif" font-size="13" fill="#000000">设置</text>

  <!-- Bottom user area -->
  <rect x="0" y="692" width="220" height="1" fill="#7A7A7A"/>
  <text x="48" y="716" font-family="Arial, sans-serif" font-size="12" fill="#000000">切换角色</text>
  <rect x="20" y="728" width="36" height="36" fill="#D0D0D0"/>
  <line x1="20" y1="728" x2="56" y2="764" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="56" y1="728" x2="20" y2="764" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="68" y="746" font-family="Arial, sans-serif" font-size="12" fill="#000000">xxx研究员</text>
  <text x="68" y="762" font-family="Arial, sans-serif" font-size="10" fill="#7A7A7A">xxxxxxx@xx.com</text>

  <!-- Top breadcrumb -->
  <rect x="220" y="0" width="942" height="48" fill="#FFFFFF"/>
  <text x="240" y="30" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A">GripFit  ›  人员工程师</text>
  <rect x="1122" y="14" width="20" height="20" fill="#D9D9D9"/>

  <!-- Step indicator -->
  <rect x="240" y="60" width="30" height="30" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="255" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#7A7A7A" text-anchor="middle">1</text>
  <text x="282" y="80" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A">填写项目信息</text>
  <line x1="400" y1="75" x2="452" y2="75" stroke="#BFBFBF" stroke-width="1"/>
  <rect x="460" y="60" width="30" height="30" fill="#7A7A7A"/>
  <text x="475" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="502" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000">选择实验范式</text>
  <text x="1060" y="80" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">选 1 个优先</text>

  <!-- Info alert bar (no icon) -->
  <rect x="240" y="106" width="902" height="34" fill="#F5F5F5" stroke="#BFBFBF" stroke-width="1"/>
  <text x="256" y="128" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">可以从不同角度交叉验证，建议至少选 1 个</text>

  <!-- LEFT PANEL -->
  <rect x="240" y="152" width="238" height="544" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>

  <text x="258" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">已选研究类型</text>
  <rect x="258" y="192" width="88" height="24" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="302" y="209" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">xxxxxx ×</text>

  <line x1="240" y1="232" x2="478" y2="232" stroke="#D9D9D9" stroke-width="1"/>

  <text x="258" y="256" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">搜寻范围</text>
  <text x="258" y="286" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#000000">建议 xx-xx 人</text>
  <text x="258" y="306" font-family="Arial, sans-serif" font-size="10" fill="#7A7A7A">基于研究类型推算</text>

  <line x1="240" y1="326" x2="478" y2="326" stroke="#D9D9D9" stroke-width="1"/>

  <text x="258" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">已选范式</text>
  <text x="258" y="374" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">尚未选择</text>

  <!-- RIGHT PANEL -->
  <rect x="490" y="152" width="652" height="544" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="508" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000">搭配研究度 — 可用实验范式（可多选）</text>

  <!-- Tabs -->
  <rect x="508" y="192" width="90" height="28" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="553" y="211" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">推荐范式</text>
  <rect x="600" y="192" width="90" height="28" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="645" y="211" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">用途筛选</text>

  <!-- Card 1 (active/highlighted) -->
  <rect x="508" y="234" width="616" height="68" fill="#F0F0F0" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="508" y="234" width="5" height="68" fill="#7A7A7A"/>
  <text x="524" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">主观量表评定</text>
  <rect x="646" y="246" width="52" height="16" fill="#BFBFBF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="672" y="258" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">用途筛选</text>
  <text x="524" y="282" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">使用 Likert 量表对多个维度评分，最常用的主观评价范式</text>

  <!-- Card 2 -->
  <rect x="508" y="314" width="616" height="68" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="508" y="314" width="5" height="68" fill="#BFBFBF"/>
  <text x="524" y="338" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">身体地图标注</text>
  <rect x="638" y="326" width="34" height="16" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="655" y="338" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">适宜</text>
  <text x="524" y="362" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">标注人体体表压力不适位置与程度，适合定位问题</text>

  <!-- Card 3 -->
  <rect x="508" y="394" width="616" height="68" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="508" y="394" width="5" height="68" fill="#BFBFBF"/>
  <text x="524" y="418" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">比较判断法</text>
  <rect x="624" y="406" width="52" height="16" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="650" y="418" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">用途筛选</text>
  <text x="524" y="442" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">多款样品两两对比，产出相对权重排序，适合竞品比较</text>

  <!-- Card 4 -->
  <rect x="508" y="474" width="616" height="68" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="508" y="474" width="5" height="68" fill="#BFBFBF"/>
  <text x="524" y="498" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">持续操控绩效测试</text>
  <rect x="666" y="486" width="34" height="16" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="683" y="498" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">研究</text>
  <text x="524" y="522" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">通过长时间使用绩效指标，观察手部疲劳变化</text>

  <!-- Card 5 -->
  <rect x="508" y="554" width="616" height="68" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="508" y="554" width="5" height="68" fill="#BFBFBF"/>
  <text x="524" y="578" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">xxxxxx</text>
  <rect x="624" y="566" width="52" height="16" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="650" y="578" font-family="Arial, sans-serif" font-size="9" fill="#000000" text-anchor="middle">xxxxxx</text>
  <text x="524" y="602" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>

  <!-- Bottom buttons -->
  <rect x="240" y="714" width="100" height="38" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="290" y="738" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">← 上一步</text>

  <rect x="876" y="714" width="266" height="38" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="1009" y="738" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">创建项目，进入方案规划 →</text>
</svg>
