  <text x="80" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000000">GripFit ToB</text>
  <text x="80" y="58" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">xxx研究员</text>

  <!-- Sidebar: 工作区 -->
  <text x="20" y="120" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A" letter-spacing="1">工作区</text>
