<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1162 769" width="1162" height="769">
  <!-- Background -->
  <rect x="0" y="0" width="1162" height="769" fill="#FFFFFF"/>

  <!-- Left sidebar -->
  <rect x="0" y="0" width="220" height="769" fill="#D9D9D9"/>

