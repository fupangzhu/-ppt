<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>

  <!-- Top nav bar (gray) -->
  <rect x="0" y="0" width="1280" height="64" fill="#7A7A7A"/>
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <!-- Top nav menu items -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">功能介绍</text>
  <text x="620" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">使用方法</text>
  <text x="740" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">关于项目</text>
  <!-- Login button -->
  <rect x="1170" y="20" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="39" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">登录</text>

  <!-- Title -->
  <text x="640" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#000000" text-anchor="middle">请问你是？</text>
  <text x="640" y="260" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle" letter-spacing="2">XXXXXXX XXXXX XXXX XXXXX</text>

  <!-- Two role cards -->
  <!-- Card 1: 消费者 -->
  <rect x="220" y="360" width="380" height="280" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <!-- Icon placeholder -->
  <rect x="260" y="400" width="56" height="56" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <line x1="260" y1="400" x2="316" y2="456" stroke="#7A7A7A" stroke-width="1"/>
  <line x1="316" y1="400" x2="260" y2="456" stroke="#7A7A7A" stroke-width="1"/>
  <!-- Title -->
  <text x="260" y="510" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#000000">消费者</text>
  <!-- Description (xxx) -->
  <text x="260" y="552" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  <text x="260" y="574" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  <text x="260" y="596" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxx</text>

  <!-- Card 2: 企业人员 -->
  <rect x="680" y="360" width="380" height="280" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <!-- Icon placeholder -->
  <rect x="720" y="400" width="56" height="56" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <line x1="720" y1="400" x2="776" y2="456" stroke="#7A7A7A" stroke-width="1"/>
  <line x1="776" y1="400" x2="720" y2="456" stroke="#7A7A7A" stroke-width="1"/>
  <!-- Title -->
  <text x="720" y="510" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#000000">企业人员</text>
  <!-- Description -->
  <text x="720" y="552" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  <text x="720" y="574" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  <text x="720" y="596" font-family="Arial, sans-serif" font-size="13" fill="#888888">xxxxxxxxxxxxxxxxxxx</text>

</svg>
