<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="56" fill="#7A7A7A"/>
  <text x="40" y="36" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <text x="440" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">功能介绍</text>
  <line x1="440" y1="56" x2="472" y2="56" stroke="#FFFFFF" stroke-width="2"/>
  <text x="560" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF">使用方法</text>
  <text x="680" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF">关于项目</text>
  <rect x="1170" y="18" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="37" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">登录</text>
  <!-- Dark hero section -->
  <rect x="0" y="56" width="1280" height="480" fill="#7A7A7A"/>
  <text x="80" y="160" font-family="Arial, sans-serif" font-size="14" fill="#D9D9D9">科学人体工学分析</text>
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">寻找</text>
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#BFBFBF">最适合您的智能手机</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="13" fill="#D9D9D9">GripFit 使用精准的生物识别分析，为您匹配最佳的符合人体工学的握持感，</text>
  <text x="80" y="382" font-family="Arial, sans-serif" font-size="13" fill="#D9D9D9">重新定义人机交互体验。</text>
  <!-- 4 Feature cards row -->
  <rect x="80" y="460" width="260" height="120" fill="#BFBFBF" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="90" y="474" width="24" height="24" fill="#D0D0D0"/>
  <text x="90" y="518" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">匹配引擎</text>
  <text x="90" y="538" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">精确分析，将手部尺寸与</text>
  <text x="90" y="556" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">设备蓝图进行比较。</text>

  <rect x="360" y="460" width="260" height="120" fill="#BFBFBF" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="370" y="474" width="24" height="24" fill="#D0D0D0"/>
  <text x="370" y="518" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">人体工学标准</text>
  <text x="370" y="538" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">基于GB/T国家标准</text>
  <text x="370" y="556" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">准的人机工程和人体工学指标。</text>

  <rect x="640" y="460" width="260" height="120" fill="#BFBFBF" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="650" y="474" width="24" height="24" fill="#D0D0D0"/>
  <text x="650" y="518" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">多维度评分</text>
  <text x="650" y="538" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">跨越握持舒适度、可及性</text>
  <text x="650" y="556" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">和骨骼形貌评分的综合评估。</text>

  <rect x="920" y="460" width="260" height="120" fill="#BFBFBF" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="930" y="474" width="24" height="24" fill="#D0D0D0"/>
  <text x="930" y="518" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">报告导出</text>
  <text x="930" y="538" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">生成详细的技术PDF报告，</text>
  <text x="930" y="556" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">展示您的符合人体工学的兼容性。</text>
  <!-- CTA section -->
  <text x="640" y="640" font-family="Arial, sans-serif" font-size="16" fill="#000000" text-anchor="middle">立即体验 GripFit</text>
  <rect x="540" y="660" width="200" height="44" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="640" y="687" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-anchor="middle">开始使用</text>
