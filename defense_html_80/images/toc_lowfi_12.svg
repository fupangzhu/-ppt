  <text x="200" y="374" font-family="Arial, sans-serif" font-size="9" fill="#BFBFBF" text-anchor="middle">P50 (current)</text>
  <text x="330" y="374" font-family="Arial, sans-serif" font-size="9" fill="#BFBFBF" text-anchor="end">P95</text>
