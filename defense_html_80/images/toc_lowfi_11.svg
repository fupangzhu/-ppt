<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="48" fill="#7A7A7A"/>
  <text x="40" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <rect x="1170" y="12" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="31" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">登录</text>
  <rect x="0" y="48" width="1280" height="803" fill="#7A7A7A"/>
  <!-- Scan frame (same as 10) -->
  <rect x="240" y="120" width="660" height="580" fill="#555555" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="240" y1="120" x2="280" y2="120" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="240" y1="120" x2="240" y2="160" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="900" y1="120" x2="860" y2="120" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="900" y1="120" x2="900" y2="160" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="240" y1="700" x2="280" y2="700" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="240" y1="700" x2="240" y2="660" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="900" y1="700" x2="860" y2="700" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="900" y1="700" x2="900" y2="660" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Hand image placeholder (scanning) -->
  <rect x="280" y="150" width="580" height="500" fill="#7A7A7A" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="280" y1="150" x2="860" y2="650" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="860" y1="150" x2="280" y2="650" stroke="#BFBFBF" stroke-width="1"/>
  <!-- Scan progress line -->
  <line x1="280" y1="360" x2="860" y2="360" stroke="#D9D9D9" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Right side: progress info -->
  <text x="960" y="340" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF">识别进度</text>
  <text x="960" y="375" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">64.18%</text>
  <rect x="960" y="390" width="200" height="8" fill="#555555"/>
  <rect x="960" y="390" width="128" height="8" fill="#D9D9D9"/>
  <!-- Scan button -->
  <rect x="440" y="728" width="400" height="48" fill="#BFBFBF"/>
  <text x="640" y="758" font-family="Arial, sans-serif" font-size="14" fill="#555555" text-anchor="middle">扫描中...</text>
  <text x="640" y="815" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF" text-anchor="middle">手动输入</text>
</svg>