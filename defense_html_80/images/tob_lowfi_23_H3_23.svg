<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1162 730" width="1162" height="730">
  <rect x="0" y="0" width="1162" height="730" fill="#FFFFFF"/>
  <rect x="0" y="0" width="220" height="730" fill="#D9D9D9"/>
  <rect x="20" y="20" width="48" height="48" fill="#D0D0D0"/>
  <line x1="20" y1="20" x2="68" y2="68" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="68" y1="20" x2="20" y2="68" stroke="#FFFFFF" stroke-width="2"/>
  <text x="80" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#000000">GripFit ToB</text>
  <text x="80" y="58" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">xxxxxxx</text>
  <text x="20" y="120" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A" letter-spacing="1">工作区</text>
  <rect x="0" y="159" width="220" height="36" fill="#BFBFBF"/>
  <text x="48" y="140" font-family="Arial, sans-serif" font-size="13" fill="#000000">工作台</text>
  <text x="48" y="177" font-family="Arial, sans-serif" font-size="13" fill="#000000">设计参考工具</text>
  <text x="48" y="214" font-family="Arial, sans-serif" font-size="13" fill="#000000">样机AI评审</text>

  <text x="20" y="290" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A" letter-spacing="1">资源</text>
  <text x="48" y="325" font-family="Arial, sans-serif" font-size="13" fill="#000000">设计库</text>
  <text x="48" y="360" font-family="Arial, sans-serif" font-size="13" fill="#000000">素材归档</text>
  <text x="48" y="395" font-family="Arial, sans-serif" font-size="13" fill="#000000">系统设置</text>

  <rect x="0" y="610" width="220" height="1" fill="#7A7A7A"/>
  <text x="48" y="640" font-family="Arial, sans-serif" font-size="12" fill="#000000">切换角色</text>
  <rect x="20" y="662" width="36" height="36" fill="#D0D0D0"/>
  <line x1="20" y1="662" x2="56" y2="698" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="56" y1="662" x2="20" y2="698" stroke="#FFFFFF" stroke-width="2"/>
  <text x="68" y="677" font-family="Arial, sans-serif" font-size="12" fill="#000000">xxx设计师</text>
  <text x="68" y="693" font-family="Arial, sans-serif" font-size="10" fill="#7A7A7A">xxxxxxx</text>
  <rect x="220" y="0" width="942" height="56" fill="#FFFFFF"/>
  <text x="252" y="34" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A">GripFit  ›  xxxxxxx</text>
  <rect x="1112" y="18" width="20" height="20" fill="#D9D9D9"/>
  <text x="252" y="90" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#000000">设计参考工具</text>
  <text x="252" y="112" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A">基于研究数据的设计参考辅助</text>
  <rect x="240" y="148" width="120" height="36" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="300" y="171" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">①目标配置</text>
  <rect x="360" y="148" width="120" height="36" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="420" y="171" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">②底模预览</text>
  <rect x="480" y="148" width="120" height="36" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="540" y="171" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">③数据&amp;图表</text>

  <!-- Two chart cards -->
  <!-- Left: S-curve / 舒适度曲线 -->
  <rect x="240" y="200" width="440" height="310" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="264" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">握持舒适度 — 尺寸S曲线</text>
  <rect x="264" y="244" width="390" height="230" fill="#F0F0F0"/>
  <line x1="264" y1="244" x2="654" y2="474" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="654" y1="244" x2="264" y2="474" stroke="#BFBFBF" stroke-width="1"/>
  <text x="459" y="365" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">S曲线图表占位</text>
  <!-- x/y axis labels -->
  <text x="459" y="488" font-family="Arial, sans-serif" font-size="10" fill="#7A7A7A" text-anchor="middle">手机宽度 (mm)</text>
  <text x="252" y="380" font-family="Arial, sans-serif" font-size="10" fill="#7A7A7A" text-anchor="middle" transform="rotate(-90,252,380)">舒适度评分</text>

  <!-- Right: 维度对比柱状图 -->
  <rect x="700" y="200" width="440" height="310" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="724" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">各维度测量均值对比</text>
  <rect x="724" y="244" width="390" height="230" fill="#F0F0F0"/>
  <line x1="724" y1="244" x2="1114" y2="474" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="1114" y1="244" x2="724" y2="474" stroke="#BFBFBF" stroke-width="1"/>
  <text x="919" y="365" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">柱状图占位</text>

  <!-- Bottom: 参数对照表 -->
  <rect x="240" y="530" width="900" height="160" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="264" y="558" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000">关键参数对照表</text>
  <!-- Table header -->
  <rect x="264" y="568" width="840" height="28" fill="#D9D9D9"/>
  <text x="280" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">参数维度</text>
  <text x="450" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">当前参考值</text>
  <text x="620" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">行业均值</text>
  <text x="790" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#000000">设计建议范围</text>
  <!-- 2 rows -->
  <rect x="264" y="596" width="840" height="28" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>
  <text x="280" y="615" font-family="Arial, sans-serif" font-size="11" fill="#000000">握持宽度适配</text>
  <text x="450" y="615" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="620" y="615" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="790" y="615" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx ~ xx mm</text>

  <rect x="264" y="624" width="840" height="28" fill="#F7F7F7" stroke="#BFBFBF" stroke-width="1"/>
  <text x="280" y="643" font-family="Arial, sans-serif" font-size="11" fill="#000000">按键高度布局</text>
  <text x="450" y="643" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="620" y="643" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx.x mm</text>
  <text x="790" y="643" font-family="Arial, sans-serif" font-size="11" fill="#000000">xx ~ xx mm</text>

  <!-- Export -->
  <rect x="968" y="698" width="140" height="30" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="1038" y="718" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">导出报告</text>
</svg>