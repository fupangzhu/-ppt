<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="851" fill="#F2F2F2"/>

  <!-- Top nav bar -->
  <rect x="0" y="0" width="1280" height="64" fill="#7A7A7A"/>
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">功能介绍</text>
  <text x="620" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">使用方法</text>
  <text x="740" y="40" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">关于项目</text>
  <rect x="1170" y="20" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="39" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">注册</text>

  <!-- Center login card -->
  <rect x="430" y="160" width="420" height="430" fill="#FFFFFF" stroke="#BFBFBF" stroke-width="1"/>

  <text x="640" y="228" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#000000" text-anchor="middle">欢迎来到GripFit</text>
  <text x="640" y="254" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="middle">请登录以继续使用</text>

  <!-- 用户名/邮箱 -->
  <text x="458" y="300" font-family="Arial, sans-serif" font-size="12" fill="#000000">用户名 / 邮箱</text>
  <rect x="458" y="312" width="324" height="40" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="472" y="337" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF">xxxxx@xxxxx.com</text>

  <!-- 密码 -->
  <text x="458" y="376" font-family="Arial, sans-serif" font-size="12" fill="#000000">密码</text>
  <rect x="458" y="388" width="324" height="40" fill="#FFFFFF" stroke="#7A7A7A" stroke-width="1"/>
  <text x="472" y="413" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF">••••••••</text>

  <!-- 登录 button -->
  <rect x="458" y="450" width="324" height="44" fill="#D9D9D9" stroke="#000000" stroke-width="1"/>
  <text x="620" y="477" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-anchor="middle">登 录</text>

  <!-- Links -->
  <text x="458" y="518" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-decoration="underline">注册账号</text>
  <text x="782" y="518" font-family="Arial, sans-serif" font-size="12" fill="#7A7A7A" text-anchor="end" text-decoration="underline">忘记密码</text>

  <line x1="458" y1="536" x2="782" y2="536" stroke="#D9D9D9" stroke-width="1"/>

  <text x="620" y="562" font-family="Arial, sans-serif" font-size="10" fill="#BFBFBF" text-anchor="middle">登录即代表同意《用户协议》与《隐私政策》</text>
</svg>
