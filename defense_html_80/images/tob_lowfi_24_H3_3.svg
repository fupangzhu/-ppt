  <text x="20" y="290" font-family="Arial, sans-serif" font-size="11" fill="#7A7A7A" letter-spacing="1">资源</text>
  <text x="48" y="325" font-family="Arial, sans-serif" font-size="13" fill="#000000">设计库</text>
  <text x="48" y="360" font-family="Arial, sans-serif" font-size="13" fill="#000000">素材归档</text>
  <text x="48" y="395" font-family="Arial, sans-serif" font-size="13" fill="#000000">系统设置</text>

  <rect x="0" y="610" width="220" height="1" fill="#7A7A7A"/>
