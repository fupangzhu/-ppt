<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 851" width="1280" height="851">
  <rect x="0" y="0" width="1280" height="851" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="48" fill="#7A7A7A"/>
  <text x="40" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="3">GRIPFIT</text>
  <rect x="1170" y="12" width="80" height="28" fill="#D9D9D9" stroke="#7A7A7A" stroke-width="1"/>
  <text x="1210" y="31" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">登录</text>
  <!-- Dark bg covers full page -->
  <rect x="0" y="48" width="1280" height="803" fill="#7A7A7A"/>
  <!-- Left panel -->
  <text x="80" y="110" font-family="Arial, sans-serif" font-size="10" fill="#BFBFBF" letter-spacing="2">ONBOARDING SEQUENCE   01/02</text>
  <rect x="80" y="122" width="200" height="2" fill="#BFBFBF"/>
  <rect x="80" y="122" width="100" height="2" fill="#FFFFFF"/>
  <text x="80" y="190" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">补充一点信息，</text>
  <text x="80" y="232" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">让推荐更精准</text>
  <!-- 性别选择 -->
  <text x="80" y="286" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF" letter-spacing="2">性别选择 / SELECT GENDER</text>
  <!-- Male selected -->
  <rect x="80" y="300" width="150" height="70" fill="#BFBFBF" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="108" y="316" width="24" height="24" fill="#D0D0D0"/>
  <text x="118" y="390" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">男 / Male</text>
  <!-- Female -->
  <rect x="246" y="300" width="150" height="70" fill="#555555" stroke="#7A7A7A" stroke-width="1"/>
  <rect x="274" y="316" width="24" height="24" fill="#7A7A7A"/>
  <text x="284" y="390" font-family="Arial, sans-serif" font-size="12" fill="#BFBFBF" text-anchor="middle">女 / Female</text>
  <!-- 年龄区间 -->
  <text x="80" y="418" font-family="Arial, sans-serif" font-size="11" fill="#BFBFBF" letter-spacing="2">年龄区间 / AGE GROUP</text>
  <rect x="80" y="430" width="130" height="56" fill="#BFBFBF" stroke="#FFFFFF" stroke-width="1"/>
  <text x="145" y="452" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#000000" text-anchor="middle">18-35</text>
  <text x="145" y="470" font-family="Arial, sans-serif" font-size="9" fill="#555555" text-anchor="middle">EARLY-MID</text>
  <rect x="226" y="430" width="130" height="56" fill="#555555" stroke="#7A7A7A" stroke-width="1"/>
  <text x="291" y="452" font-family="Arial, sans-serif" font-size="13" fill="#BFBFBF" text-anchor="middle">36-55</text>
  <text x="291" y="470" font-family="Arial, sans-serif" font-size="9" fill="#7A7A7A" text-anchor="middle">EXPERIENCED</text>
  <rect x="372" y="430" width="130" height="56" fill="#555555" stroke="#7A7A7A" stroke-width="1"/>
  <text x="437" y="452" font-family="Arial, sans-serif" font-size="13" fill="#BFBFBF" text-anchor="middle">56+</text>
  <text x="437" y="470" font-family="Arial, sans-serif" font-size="9" fill="#7A7A7A" text-anchor="middle">SENIOR</text>
  <!-- Submit button -->
  <rect x="80" y="540" width="300" height="48" fill="#D9D9D9"/>
  <text x="230" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000" text-anchor="middle">确认提交 →</text>
  <!-- Right panel: phone image placeholder -->
  <rect x="660" y="48" width="620" height="803" fill="#555555"/>
  <rect x="800" y="200" width="340" height="560" fill="#7A7A7A" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="800" y1="200" x2="1140" y2="760" stroke="#BFBFBF" stroke-width="1"/>
  <line x1="1140" y1="200" x2="800" y2="760" stroke="#BFBFBF" stroke-width="1"/>
  <!-- Measurement labels -->
  <rect x="860" y="380" width="140" height="36" fill="#BFBFBF"/>
  <text x="870" y="394" font-family="Arial, sans-serif" font-size="9" fill="#555555">LEFT HAND AVERAGE</text>
  <text x="870" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000">42.4 kgf</text>
  <rect x="1010" y="380" width="140" height="36" fill="#BFBFBF"/>
  <text x="1020" y="394" font-family="Arial, sans-serif" font-size="9" fill="#555555">RIGHT HAND AVERAGE</text>
  <text x="1020" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000000">45.8 kgf</text>
</svg>